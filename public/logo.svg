<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background: Deep Black -->
  <rect width="512" height="512" rx="128" fill="#000000" />
  
  <!-- Symbol: Stylized "Ex" -->
  <!-- Symbol: Single "X" -->
  <g transform="translate(256 256) scale(1.2)">
    <path d="M-100 -100 L100 100" stroke="url(#gold)" stroke-width="48" stroke-linecap="round" filter="url(#shadow)"/>
    <path d="M100 -100 L-100 100" stroke="url(#gold)" stroke-width="48" stroke-linecap="round" filter="url(#shadow)"/>
  </g>
</svg>
